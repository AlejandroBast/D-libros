{% extends 'gestion/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 text-center">
        <h2>¿Eliminar autor?</h2>
        <p class="lead">¿Seguro que deseas eliminar a <strong>{{ nombre }}</strong>?</p>
        <p class="text-danger small">⚠ También se eliminarán todos sus libros.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">Sí, eliminar</button>
            <a href="{% url 'lista_autores' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
